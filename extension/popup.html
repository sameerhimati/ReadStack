<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Save to ReadStack</title>
  <style>
    :root {
      --paper: #fbfaf7;
      --ink: #1a1a1a;
      --terracotta: #b5562e;
      --muted: #6b6b66;
      --line: #e7e4dc;
    }
    * { box-sizing: border-box; }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--paper);
      color: var(--ink);
      font: 14px/1.4 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .title {
      font-weight: 600;
      font-size: 15px;
      margin-bottom: 4px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    button {
      width: 100%;
      padding: 10px 14px;
      border: 0;
      border-radius: 8px;
      background: var(--terracotta);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.05); }
    button:disabled { opacity: 0.6; cursor: default; }
    .status {
      min-height: 18px;
      margin-top: 10px;
      font-size: 13px;
      color: var(--muted);
    }
    .status.ok { color: #2e7d32; }
    .status.err { color: #b5562e; }
    .api {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--line);
      font-size: 11px;
      color: var(--muted);
    }
    .api label { display: block; margin-bottom: 4px; }
    .api input {
      width: 100%;
      padding: 5px 7px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <h1>Save to ReadStack</h1>
  <div class="title" id="title">Loading…</div>
  <div class="url" id="url"></div>
  <button id="save">Save to ReadStack</button>
  <div class="status" id="status"></div>
  <div class="api">
    <label for="api">Backend</label>
    <input id="api" type="text" spellcheck="false" />
  </div>
  <script src="popup.js"></script>
</body>
</html>
